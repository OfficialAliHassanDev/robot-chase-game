<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏨 Hotel Lobby Escape Game</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="startScreen">
    <h1>🤖 Robot Chase Game</h1>
    <p>Collect coins, survive the robot, and level up!</p>
    <button id="startBtn">▶ Start Game</button>
</div>

<header class="game-title">
    <h1>🏡 Ground Lobby Escape Game</h1>
</header>

<div id="gameArea">

    <div id="hud">
        <span id="score">💖 Score: 0</span>
        <span id="level">🔥 Level: 1</span>
    </div>

    <div id="levelPopup">🎉 LEVEL UP!</div>

    <div id="human"></div>
    <div id="coin"></div>
    <div id="robot"></div>

    <div id="gameOver">
        GAME OVER
        <button onclick="location.reload()">Restart</button>
    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
